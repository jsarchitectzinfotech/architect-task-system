<div class="page-container" *ngIf="!loading && project; else loader">
  <div class="page-header">
    <div>
      <button mat-icon-button routerLink="/projects" class="back-btn"><mat-icon>arrow_back</mat-icon></button>
      <h1>{{ project.name }}</h1>
      <div class="meta">
        <app-status-badge [status]="project.status"></app-status-badge>
        <span *ngIf="project.clientName">Client: {{ project.clientName }}</span>
        <span *ngIf="project.location">📍 {{ project.location }}</span>
        <span *ngIf="project.projectCode">Code: {{ project.projectCode }}</span>
      </div>
    </div>
    <div class="header-actions">
      <ng-container *ngIf="auth.isManager">
        <button mat-stroked-button (click)="editProject()"><mat-icon>edit</mat-icon> Edit</button>
        <button mat-stroked-button color="warn" (click)="deleteProject()"><mat-icon>delete</mat-icon> Delete</button>
        <button mat-raised-button color="primary" (click)="openAssign()"><mat-icon>add</mat-icon> Assign Task</button>
      </ng-container>
    </div>
  </div>

  <p *ngIf="project.description" class="description">{{ project.description }}</p>

  <mat-card>
    <mat-card-header><mat-card-title>Tasks ({{ tasks.length }})</mat-card-title></mat-card-header>
    <table mat-table [dataSource]="tasks" class="task-table">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let t" class="clickable" (click)="viewTask(t.id)">{{ t.title }}</td>
      </ng-container>
      <ng-container matColumnDef="assignedTo">
        <th mat-header-cell *matHeaderCellDef>Assigned To</th>
        <td mat-cell *matCellDef="let t">{{ t.assignedTo?.name }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let t"><app-status-badge [status]="t.status"></app-status-badge></td>
      </ng-container>
      <ng-container matColumnDef="priority">
        <th mat-header-cell *matHeaderCellDef>Priority</th>
        <td mat-cell *matCellDef="let t"><app-status-badge [status]="t.priority"></app-status-badge></td>
      </ng-container>
      <ng-container matColumnDef="dueDate">
        <th mat-header-cell *matHeaderCellDef>Due</th>
        <td mat-cell *matCellDef="let t">{{ t.dueDate | date }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let t">
          <ng-container *ngIf="auth.isManager">
            <button mat-icon-button (click)="editTask(t)" matTooltip="Edit task"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" (click)="deleteTask(t)" matTooltip="Delete task"><mat-icon>delete</mat-icon></button>
          </ng-container>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns:columns" class="row-hover"></tr>
    </table>
    <p *ngIf="tasks.length===0" class="empty">No tasks in this project yet.</p>
  </mat-card>
</div>
<ng-template #loader><mat-spinner style="margin:80px auto;display:block"></mat-spinner></ng-template>
