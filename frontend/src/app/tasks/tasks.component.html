<div class="page-container">
  <div class="page-header">
    <h1>Tasks</h1>
    <button mat-raised-button color="primary" *ngIf="auth.isManager" (click)="openAssign()">
      <mat-icon>add</mat-icon> Assign Task
    </button>
  </div>
  <div *ngIf="loading"><mat-spinner style="margin:80px auto;display:block"></mat-spinner></div>
  <mat-card *ngIf="!loading">
    <table mat-table [dataSource]="tasks" class="task-table">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let t" class="clickable" (click)="view(t.id)">{{ t.title }}</td>
      </ng-container>
      <ng-container matColumnDef="project">
        <th mat-header-cell *matHeaderCellDef>Project</th>
        <td mat-cell *matCellDef="let t">{{ t.projectName }}</td>
      </ng-container>
      <ng-container matColumnDef="assignedTo">
        <th mat-header-cell *matHeaderCellDef>Assigned To</th>
        <td mat-cell *matCellDef="let t">{{ t.assignedTo?.name }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let t"><app-status-badge [status]="t.status"></app-status-badge></td>
      </ng-container>
      <ng-container matColumnDef="priority">
        <th mat-header-cell *matHeaderCellDef>Priority</th>
        <td mat-cell *matCellDef="let t"><app-status-badge [status]="t.priority"></app-status-badge></td>
      </ng-container>
      <ng-container matColumnDef="dueDate">
        <th mat-header-cell *matHeaderCellDef>Due</th>
        <td mat-cell *matCellDef="let t">{{ t.dueDate | date }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let t">
          <button mat-icon-button (click)="editTask($event, t)" matTooltip="Edit task"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="deleteTask($event, t)" matTooltip="Delete task"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let r; columns:columns" class="row-hover"></tr>
    </table>
    <p *ngIf="tasks.length===0" class="empty">No tasks found.</p>
  </mat-card>
</div>
