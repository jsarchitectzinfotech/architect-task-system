<h2 mat-dialog-title>{{ isEdit ? 'Edit Task' : 'Assign New Task' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="form-grid">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Task Title</mat-label>
      <input matInput formControlName="title">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Assign To</mat-label>
      <mat-select formControlName="assignedToId">
        <mat-option *ngFor="let u of juniors" [value]="u.id">{{ u.name }}</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Project</mat-label>
      <mat-select formControlName="projectId">
        <mat-option *ngFor="let p of projects" [value]="p.id">{{ p.name }}</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Priority</mat-label>
      <mat-select formControlName="priority">
        <mat-option *ngFor="let p of priorities" [value]="p">{{ p }}</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Due Date</mat-label>
      <input matInput [matDatepicker]="dp" formControlName="dueDate">
      <mat-datepicker-toggle matSuffix [for]="dp"></mat-datepicker-toggle>
      <mat-datepicker #dp></mat-datepicker>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Estimated Hours</mat-label>
      <input matInput type="number" formControlName="estimatedHours">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="loading || form.invalid">
    {{ isEdit ? 'Save Changes' : 'Assign Task' }}
  </button>
</mat-dialog-actions>
