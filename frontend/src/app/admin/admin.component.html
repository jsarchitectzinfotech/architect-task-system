<div class="page-container">
  <div class="page-header">
    <h1>Team Management</h1>
    <button mat-raised-button color="primary" (click)="openRegister()"><mat-icon>person_add</mat-icon> Add Member</button>
  </div>
  <div *ngIf="loading"><mat-spinner style="margin:80px auto;display:block"></mat-spinner></div>
  <mat-card *ngIf="!loading">
    <table mat-table [dataSource]="users">
      <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Name</th><td mat-cell *matCellDef="let u">{{ u.name }}</td></ng-container>
      <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Email</th><td mat-cell *matCellDef="let u">{{ u.email }}</td></ng-container>
      <ng-container matColumnDef="role"><th mat-header-cell *matHeaderCellDef>Role</th><td mat-cell *matCellDef="let u"><app-status-badge [status]="u.role"></app-status-badge></td></ng-container>
      <ng-container matColumnDef="designation"><th mat-header-cell *matHeaderCellDef>Designation</th><td mat-cell *matCellDef="let u">{{ u.designation }}</td></ng-container>
      <ng-container matColumnDef="active"><th mat-header-cell *matHeaderCellDef>Active</th><td mat-cell *matCellDef="let u"><mat-slide-toggle [checked]="u.active" (change)="toggle(u)"></mat-slide-toggle></td></ng-container>
      <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef></th><td mat-cell *matCellDef="let u"></td></ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let r; columns:columns"></tr>
    </table>
  </mat-card>
</div>
